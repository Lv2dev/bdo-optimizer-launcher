name: CI

# fmt / clippy / cargo check / 단위 테스트 / 디자인 parity 검증을 수행한다.
# M69 이후 debug/test 빌드는 app.dev.manifest(asInvoker)로 임베드되어
# 일반 (비-elevated) 셸에서 cargo test --all-targets 실제 실행이 가능하다.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check + clippy + fmt
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --no-deps --locked -- -D warnings

      - name: cargo check
        run: cargo check --all-targets --locked

      - name: cargo test
        # M69 이후 debug/test manifest는 asInvoker라 일반 셸 실행 가능.
        run: cargo test --all-targets --locked

  frontend:
    name: Frontend build + design parity
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: npm run check:design-parity
        run: npm run check:design-parity

      - name: npm run build
        run: npm run build

  release-guard:
    name: Release workflow guard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate release workflow + manifests + README
        shell: pwsh
        run: ./scripts/check_release_workflow.ps1
